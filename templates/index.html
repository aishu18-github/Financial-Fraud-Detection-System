<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Fraud Detection System</h2>

    <form action="/predict" method="POST">

        <label>Amount</label>
        <input type="number" name="amount" required>

        <label>Hour (0–23)</label>
        <input type="number" name="hour" min="0" max="23" required>

        <label>Payment Mode</label>
        <select name="payment_mode">
            <option>UPI</option>
            <option>Card</option>
            <option>Netbanking</option>
            <option>Wallet</option>
        </select>

        <label>Transaction Type</label>
        <select name="txn_type">
            <option>Online</option>
            <option>Offline</option>
        </select>

        <label>International Transaction</label>
        <select name="international">
            <option>No</option>
            <option>Yes</option>
        </select>

        <label>New Device</label>
        <select name="new_device">
            <option>No</option>
            <option>Yes</option>
        </select>

        <button type="submit">Analyze Transaction</button>

    </form>

</div>

</body>
</html>
